<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Bhagawan IT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="https://bhagawangautam.com.np/images/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://bhagawangautam.com.np/images/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://bhagawangautam.com.np/images/favicon.png">
    <link rel="shortcut icon" href="https://bhagawangautam.com.np/images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="canonical" href="https://bhagawangautam.com.np/forgot-password">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Forgot Password | Bhagawan IT">
    <meta property="og:description" content="Recover your Bhagawan IT account password.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bhagawangautam.com.np/forgot-password">
    <meta property="og:image" content="https://bhagawangautam.com.np/images/logo.png">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Forgot Password | Bhagawan IT">
    <meta name="twitter:description" content="Recover your Bhagawan IT account password.">
    <meta name="twitter:image" content="https://bhagawangautam.com.np/images/logo.png">
</head>
<body style="background: var(--bg-deep-navy);">

    <header class="scrolled">
        <div class="container">
            <nav>
                <a href="/" class="logo"><img src="images/logo.png" alt="Bhagawan IT Logo" style="max-height: 60px; width: auto; vertical-align: middle;"></a>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="login">Log In</a>
                    <a href="signup" class="btn btn-primary btn-pill">Sign Up</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="page-content" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="container" style="max-width: 450px;">
            <div class="card glass-effect animate-on-scroll">
                <div class="text-center mb-4">
                    <span style="font-size: 3rem;">🔐</span>
                    <h2 class="mt-2">Reset Password</h2>
                    <p class="text-muted-gray">Enter your email and we'll send you a link to get back into your account.</p>
                </div>

                <form id="forgot-password-form" class="contact-form">
                    <div id="forgot-error" style="color: var(--color-primary-red); text-align: center; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>
                    <div id="forgot-success" style="color: #52B788; text-align: center; font-size: 0.9rem; margin-bottom: 1rem; display: none; background: rgba(82, 183, 136, 0.1); padding: 1rem; border-radius: 8px;"></div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                    </div>
                    
                    <button type="submit" id="reset-request-btn" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Send Reset Link</button>
                    
                    <div class="text-center mt-3">
                        <a href="login" style="font-size: 0.9rem; color: var(--text-muted-gray);">Back to Log In</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer section-padding" style="padding: 2rem 0;">
        <div class="container text-center">
            <p>&copy; 2026 Bhagawan IT. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
