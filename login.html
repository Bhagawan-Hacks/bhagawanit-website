<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Bhagawan IT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><img src="images/logo.png" alt="Bhagawan IT Logo" style="max-height: 35px; width: auto; vertical-align: middle;"></a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="signup.html">Sign Up</a>
                    <a href="login.html" class="active btn btn-primary btn-pill mobile-cta">Log In</a>
                </div>
                <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
            </nav>
        </div>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding-top: 80px;">
        <div class="card glass-effect animate-on-scroll" style="width: 100%; max-width: 400px;">
            <h2 class="text-center mb-3">Welcome Back</h2>
            <form id="login-form" class="contact-form">
                <div id="login-error" style="color: var(--color-primary-red); text-align: center; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    <div class="text-right mt-1">
                        <a href="forgot-password.html" style="font-size: 0.8rem; color: var(--text-muted-gray);">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
            </form>
            <p class="text-center mt-3" style="font-size: 0.9rem;">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </p>
        </div>
    </main>

    <!-- Configure Supabase -->
    <script src="js/supabase-config.js"></script>
    <!-- Common UI JS -->
    <script src="js/main.js"></script>
    <!-- Auth Logic -->
    <script src="js/auth.js"></script>
</body>
</html>
