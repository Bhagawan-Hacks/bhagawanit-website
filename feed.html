<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Feed | AkashIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .feed-container { max-width: 600px; margin: 0 auto; }
        .post-card { background: var(--bg-card-dark); border-radius: var(--radius-card); margin-bottom: 2rem; overflow: hidden; box-shadow: var(--shadow-card); }
        .post-header { padding: 1rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--color-primary-blue); }
        .post-author { font-weight: 600; color: var(--text-off-white); }
        .post-image { width: 100%; display: block; object-fit: cover; max-height: 600px; background: rgba(0,0,0,0.2); }
        .post-body { padding: 1rem; }
        .post-caption { color: var(--text-off-white); margin-bottom: 0.5rem; }
        .post-time { font-size: 0.8rem; color: var(--text-muted-gray); }
        
        .upload-section { background: var(--bg-card-glass); padding: 1.5rem; border-radius: var(--radius-card); margin-bottom: 2rem; }
    </style>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Akash<span>IT</span></a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="feed.html" class="active">Feed</a>
                    <a href="#" id="logout-btn" class="btn btn-outline btn-pill mobile-cta" style="padding: 0.5rem 1rem;">Log Out</a>
                </div>
                <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
            </nav>
        </div>
    </header>

    <main class="feed-container" style="padding-top: 100px; flex: 1; width: 100%;">
        
        <!-- Upload Section -->
        <div class="upload-section animate-on-scroll">
            <h3 class="mb-2">Create a New Post</h3>
            <form id="post-form">
                <div id="post-error" style="color: var(--color-primary-red); font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>
                <div class="form-group mb-2">
                    <input type="file" id="post-image" class="form-control" accept="image/*" required style="padding: 0.5rem;">
                </div>
                <div class="form-group mb-2">
                    <textarea id="post-caption" class="form-control" placeholder="Write a caption..." rows="2" style="min-height: 60px;"></textarea>
                </div>
                <button type="submit" id="post-submit-btn" class="btn btn-primary" style="width: 100%;">Post to Feed</button>
            </form>
        </div>

        <!-- Feed List -->
        <div id="feed-list">
            <p class="text-center" style="color: var(--text-muted-gray);">Loading feed...</p>
        </div>

    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
